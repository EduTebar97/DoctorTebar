services:
  - type: web
    name: doctor-tebar-api
    env: node
    plan: starter
    buildCommand: npm install --include=dev && npm --workspace @doctor-tebar/api run build
    startCommand: npm --workspace @doctor-tebar/api run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: COOKIE_NAME
        value: etb_session
      - key: CLIENT_ORIGIN
        value: https://eduardotebarboti.com,https://www.eduardotebarboti.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
