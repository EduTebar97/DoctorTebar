name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  test-build:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm install
      - name: Test
        run: npm run test
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/doctor_tebar_test
          JWT_SECRET: test_secret
      - name: Build
        run: npm run build
