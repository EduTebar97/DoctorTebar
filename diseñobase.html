  <style>
    :root{
      --bg:#07111f; --bg2:#0b1729; --panel:rgba(15,27,48,.78); --panel2:rgba(23,38,65,.9);
      --text:#eaf2ff; --muted:#9fb1cd; --line:rgba(150,180,255,.14); --brand:#66e3ff; --brand2:#a78bfa;
      --ok:#43e0a1; --warn:#ffd166; --danger:#ff6b8b; --shadow:0 25px 80px rgba(0,0,0,.42);

    }
    *{box-sizing:border-box}

      radial-gradient(circle at 12% 8%, rgba(102,227,255,.18), transparent 28%),
      radial-gradient(circle at 82% 12%, rgba(167,139,250,.2), transparent 30%),
      radial-gradient(circle at 50% 90%, rgba(67,224,161,.09), transparent 35%),
      linear-gradient(135deg,#06101d,#081425 45%,#0a0f1c);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;min-height:100vh;overflow-x:hidden}
    a{color:inherit;text-decoration:none}
    button,input,textarea,select{font:inherit}
    .app{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh;transition:.25s ease}
    .app.collapsed{--sidebar:78px}
    .sidebar{position:sticky;top:0;height:100vh;padding:18px;border-right:1px solid var(--line);background:rgba(5,12,24,.74);backdrop-filter:blur(22px);display:flex;flex-direction:column;gap:14px;z-index:10}
    .brand{display:flex;align-items:center;gap:12px;padding:10px 8px 16px;border-bottom:1px solid var(--line)}
    .logo{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,var(--brand),var(--brand2));box-shadow:0 0 35px rgba(102,227,255,.35);display:grid;place-items:center;font-weight:900;color:#06111f}
    .brand-text{white-space:nowrap;overflow:hidden}.brand-title{font-weight:850;letter-spacing:.2px}.brand-sub{font-size:12px;color:var(--muted);margin-top:3px}
    .collapsed .brand-text,.collapsed .nav-label,.collapsed .section-title,.collapsed .nav-note,.collapsed .profile-mini{display:none}
    .toggle{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);border-radius:14px;padding:10px 12px;cursor:pointer}.toggle:hover{background:rgba(255,255,255,.08)}
    .section-title{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:#82a0c9;margin:14px 8px 4px}
    .nav{display:flex;flex-direction:column;gap:6px}.nav button{border:0;background:transparent;color:var(--muted);padding:11px 10px;border-radius:14px;display:flex;align-items:center;gap:11px;cursor:pointer;text-align:left}.nav button:hover{background:rgba(255,255,255,.055);color:#fff}.nav button.active{background:linear-gradient(135deg,rgba(102,227,255,.18),rgba(167,139,250,.16));color:#fff;border:1px solid rgba(102,227,255,.22)}
    .ico{width:28px;height:28px;border-radius:10px;background:rgba(255,255,255,.07);display:grid;place-items:center;flex:0 0 28px}.nav-note{margin-top:auto;padding:14px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.035);font-size:12px;color:var(--muted);line-height:1.45}.profile-mini{display:flex;gap:10px;align-items:center}.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1be7ff,#c084fc);display:grid;place-items:center;font-weight:900;color:#07111f}.main{min-width:0}.topbar{position:sticky;top:0;z-index:7;height:72px;border-bottom:1px solid var(--line);background:rgba(7,17,31,.72);backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:space-between;padding:0 24px}.crumb{font-size:13px;color:var(--muted)}.mode-switch{display:flex;gap:8px;background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:16px;padding:5px}.mode-switch button{border:0;border-radius:12px;color:var(--muted);background:transparent;padding:9px 13px;cursor:pointer}.mode-switch button.active{background:#fff;color:#091426;font-weight:800}.content{padding:26px;max-width:1480px;margin:0 auto}.hero{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:32px;padding:38px;background:linear-gradient(135deg,rgba(15,27,48,.92),rgba(20,18,45,.82));box-shadow:var(--shadow)}.hero:before{content:"";position:absolute;inset:-2px;background:radial-gradient(circle at 80% 20%,rgba(102,227,255,.20),transparent 28%),radial-gradient(circle at 28% 10%,rgba(167,139,250,.18),transparent 30%);pointer-events:none}.hero>*{position:relative}.eyebrow{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(102,227,255,.28);background:rgba(102,227,255,.08);border-radius:999px;padding:8px 12px;color:#c7f7ff;font-size:13px}.h1{font-size:clamp(34px,5vw,70px);line-height:.97;margin:20px 0 16px;font-weight:900;letter-spacing:-.055em}.lead{font-size:18px;color:#cbd7ea;line-height:1.7;max-width:850px}.cta-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}.btn{border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);padding:12px 16px;border-radius:15px;cursor:pointer;font-weight:750}.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.1)}.btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#06111f;border:0}.btn.good{background:linear-gradient(135deg,#43e0a1,#66e3ff);color:#06111f;border:0}.btn.danger{border-color:rgba(255,107,139,.35);color:#ffd7df}.grid{display:grid;gap:18px}.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}.card{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);box-shadow:0 18px 50px rgba(0,0,0,.18);padding:22px;backdrop-filter:blur(16px)}.card h3{margin:0 0 10px}.muted{color:var(--muted)}.kpi{font-size:34px;font-weight:900;letter-spacing:-.04em}.tag{display:inline-flex;margin:4px 6px 4px 0;padding:7px 10px;border-radius:999px;background:rgba(102,227,255,.08);border:1px solid rgba(102,227,255,.18);color:#c9f8ff;font-size:12px}.pill{padding:6px 9px;border-radius:999px;font-size:12px;border:1px solid var(--line);color:var(--muted)}.section{margin-top:22px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 18px}.tabs button{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);padding:10px 13px;border-radius:999px;cursor:pointer}.tabs button.active{background:#fff;color:#081426;font-weight:850}.form{display:grid;gap:12px}.input,.textarea,.select{width:100%;border:1px solid var(--line);background:rgba(2,8,18,.48);color:var(--text);border-radius:15px;padding:13px 14px;outline:0}.textarea{min-height:140px;resize:vertical;line-height:1.55}.input:focus,.textarea:focus,.select:focus{border-color:rgba(102,227,255,.55);box-shadow:0 0 0 4px rgba(102,227,255,.08)}.split{display:grid;grid-template-columns:1.08fr .92fr;gap:18px}.post-card{cursor:pointer;transition:.18s}.post-card:hover{transform:translateY(-3px);border-color:rgba(102,227,255,.35)}.post-title{font-size:22px;font-weight:900;letter-spacing:-.025em}.post-body{line-height:1.75;color:#d8e4f5}.post-body p{margin:0 0 14px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.route-shell{animation:fade .18s ease}@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.public-wrap{background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:34px;overflow:hidden}.public-nav{height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.035)}.public-links{display:flex;gap:8px;flex-wrap:wrap}.public-links button{border:0;background:transparent;color:var(--muted);padding:9px 11px;border-radius:12px;cursor:pointer}.public-links button.active,.public-links button:hover{background:rgba(255,255,255,.08);color:#fff}.public-content{padding:24px}.service-card{position:relative;overflow:hidden}.service-card:after{content:"";position:absolute;right:-40px;top:-40px;width:140px;height:140px;border-radius:50%;background:rgba(102,227,255,.09)}.check{display:flex;gap:10px;align-items:flex-start;margin:10px 0}.check input{accent-color:#66e3ff;margin-top:3px}.table{width:100%;border-collapse:separate;border-spacing:0 8px}.table th{text-align:left;color:#90a5c2;font-size:12px;text-transform:uppercase;letter-spacing:.1em;padding:0 10px}.table td{background:rgba(255,255,255,.04);padding:12px 10px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}.table td:first-child{border-left:1px solid var(--line);border-radius:14px 0 0 14px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 14px 14px 0}.preview-frame{border-radius:22px;border:1px solid var(--line);background:linear-gradient(135deg,rgba(255,255,255,.045),rgba(255,255,255,.02));overflow:hidden}.mini-browser{height:32px;background:rgba(0,0,0,.18);display:flex;align-items:center;gap:6px;padding:0 12px;border-bottom:1px solid var(--line)}.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.35)}.hidden-mobile{display:block}.toast{position:fixed;right:22px;bottom:22px;background:#fff;color:#081426;padding:14px 16px;border-radius:16px;box-shadow:var(--shadow);font-weight:850;z-index:99}.public-footer{padding:24px;border-top:1px solid var(--line);color:var(--muted);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.metric-line{height:8px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:10px}.metric-line span{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2))}.article-detail{max-width:900px;margin:0 auto}.article-detail h1{font-size:clamp(32px,4vw,54px);letter-spacing:-.05em;line-height:1}.article-meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);margin:14px 0 24px}.divider{height:1px;background:var(--line);margin:20px 0}
    @media(max-width:1050px){.grid.cols-4,.grid.cols-3{grid-template-columns:repeat(2,minmax(0,1fr))}.split{grid-template-columns:1fr}.app{--sidebar:78px}.brand-text,.nav-label,.section-title,.nav-note,.profile-mini{display:none}}
    @media(max-width:720px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto;flex-direction:row;overflow:auto}.main{width:100%}.topbar{position:relative;height:auto;padding:12px;gap:12px;flex-wrap:wrap}.content{padding:14px}.hero{padding:24px}.grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr}.public-nav{height:auto;gap:12px;padding:12px;align-items:flex-start;flex-direction:column}.hidden-mobile{display:none}.sidebar .toggle{display:none}.nav{flex-direction:row}.nav button{white-space:nowrap}.section-title,.nav-note,.profile-mini,.brand-text{display:none!important}}
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const {useEffect,useMemo,useRef,useState}=React;
const LS_KEY='tebarbotic_clinical_methodology_ria_v2';

const seedPosts=[
 {id:crypto.randomUUID(),status:'Publicado',type:'Artículo docente',category:'Fundamentos',title:'Asociación, causalidad y predicción: tres objetivos que no deben confundirse',excerpt:'Una guía para médicos investigadores sobre por qué un mismo modelo multivariable puede servir para tareas muy distintas, pero no justificar las mismas conclusiones.',author:'Eduardo Tebar Boti',date:'2026-05-03',read:'12 min',tags:['causalidad','predicción','regresión'],body:`La investigación clínica rigurosa empieza antes del análisis estadístico. El primer paso consiste en saber qué tipo de pregunta se está formulando. No es lo mismo describir una población, estimar una asociación, predecir riesgo individual o estimar el efecto de una estrategia clínica.

Cuando el objetivo es predictivo, el modelo se juzga por su capacidad para estimar riesgo en pacientes concretos: discriminación, calibración, utilidad clínica y transportabilidad. Cuando el objetivo es causal, la pregunta cambia: queremos comparar escenarios contrafactuales, definir una población diana, una exposición o intervención, un comparador, un desenlace y un horizonte temporal.

El error frecuente aparece cuando se construye una regresión multivariable y se interpreta automáticamente cada coeficiente como si fuera un efecto causal. Ajustar por variables no transforma una asociación en causalidad. Para hablar de efecto causal hay que declarar el estimando, justificar el diseño, evitar sesgos temporales y seleccionar covariables según estructura causal, no por p valor.

El principio editorial de este blog es simple: pregunta, diseño, estimando, modelo, supuestos, interpretación y reporte deben estar alineados.`},
 {id:crypto.randomUUID(),status:'Publicado',type:'Nota crítica',category:'Causalidad',title:'Por qué un OR ajustado no demuestra causalidad',excerpt:'El odds ratio ajustado puede ser útil, pero no define por sí mismo un efecto causal. La interpretación depende de la pregunta, el diseño, las covariables y el tiempo cero.',author:'Eduardo Tebar Boti',date:'2026-05-02',read:'9 min',tags:['OR','estimando','confusión'],body:`En muchos artículos biomédicos se lee que una variable se asocia de forma independiente con un desenlace porque conserva significación estadística en una regresión multivariable. Esa frase puede ser descriptiva o predictiva, pero no basta para establecer causalidad.

Un efecto causal exige una pregunta contrafactual: qué habría ocurrido en la misma población bajo una estrategia frente a otra. Para eso hay que especificar población, intervención, comparador, outcome, horizonte temporal y medida de efecto. También hay que justificar que las covariables incluidas son confusores y no mediadores, colliders o variables posteriores a la exposición.

Un OR ajustado puede estimar una asociación condicional. Puede formar parte de un análisis causal si el diseño y los supuestos son defendibles. Pero el estimador estadístico no crea el estimando. Primero se declara el efecto de interés; después se elige la estrategia de identificación y el estimador.`},
 {id:crypto.randomUUID(),status:'Publicado',type:'Caso metodológico',category:'Predicción',title:'AUC no es suficiente: calibración y utilidad clínica en scores pronósticos',excerpt:'Un score puede discriminar de forma aceptable y aun así producir riesgos absolutos mal calibrados que conduzcan a decisiones clínicas equivocadas.',author:'Eduardo Tebar Boti',date:'2026-05-01',read:'10 min',tags:['AUC','calibración','scores'],body:`La AUC mide la capacidad de un modelo para ordenar pacientes de mayor a menor riesgo, pero no indica si las probabilidades predichas son correctas. En clínica, muchas decisiones dependen del riesgo absoluto: ingresar en UCI, indicar monitorización, seleccionar tratamiento o informar pronóstico.

Si un modelo predice 30% de mortalidad en un grupo donde realmente muere el 15%, el modelo puede discriminar, pero está mal calibrado. La calibración debe evaluarse mediante calibration-in-the-large, pendiente de calibración y curvas de calibración. Además, la utilidad clínica debe analizarse con umbrales de decisión y, cuando procede, decision curve analysis.

Validar un modelo no es solo publicar una AUC. Es comprobar si el modelo conserva rendimiento, calibración y utilidad en la población donde se pretende usar.`},
 {id:crypto.randomUUID(),status:'Borrador',type:'Plantilla',category:'Reporte',title:'Checklist antes de enviar un estudio observacional causal',excerpt:'Plantilla interna para revisar objetivo, tiempo cero, covariables, sesgos, análisis de sensibilidad y lenguaje causal antes del envío a revista.',author:'Eduardo Tebar Boti',date:'2026-05-03',read:'7 min',tags:['STROBE','checklist','observacional'],body:`Esta plantilla revisa si el manuscrito declara con claridad la pregunta causal, el estimando, la población, el comparador, el tiempo cero, el outcome y el horizonte temporal. También obliga a comprobar si las covariables se han elegido por estructura causal, si se han evitado variables post-exposición y si las conclusiones son proporcionales al diseño.`}
];

const defaultState={
  mode:'public', route:'home', collapsed:false, selectedPostId:null,
  posts:seedPosts,
  services:[
    {name:'Consulta pre-protocolo',desc:'Refinamiento de pregunta clínica, diseño, estimando, outcome, tamaño muestral, plan de análisis y sensibilidad.',level:'Máximo valor metodológico'},
    {name:'Análisis estadístico aplicado',desc:'Modelos multivariables, causalidad observacional, propensity score, IPTW, supervivencia, competing risks y validación.',level:'STATA 17 / reproducible'},
    {name:'Modelos predictivos clínicos',desc:'Desarrollo, validación interna y externa, calibración, actualización, utilidad clínica y reporte TRIPOD+AI.',level:'Scores / pronóstico'},
    {name:'Manuscrito y revisores',desc:'Revisión de métodos, coherencia entre objetivos y conclusiones, checklists, respuesta a revisores y tablas/figuras.',level:'Pre-envío'}
  ],
  inquiries:[],
  assets:[
    {id:crypto.randomUUID(),name:'Plantilla de plan de análisis estadístico',kind:'Plantilla',status:'Publicado',updated:'2026-05-03'},
    {id:crypto.randomUUID(),name:'Checklist STROBE interpretada',kind:'Checklist',status:'Publicado',updated:'2026-05-02'},
    {id:crypto.randomUUID(),name:'Guía de validación externa de modelos',kind:'Guía',status:'Borrador',updated:'2026-05-01'}
  ]
};
function loadState(){try{const raw=localStorage.getItem(LS_KEY);return raw?{...defaultState,...JSON.parse(raw)}:defaultState}catch(e){return defaultState}}
function saveState(s){localStorage.setItem(LS_KEY,JSON.stringify(s))}
function today(){return new Date().toISOString().slice(0,10)}
function nl2p(txt){return (txt||'').split('\n').filter(Boolean).map((p,i)=><p key={i}>{p}</p>)}

function App(){
 const [state,setState]=useState(loadState); const [toast,setToast]=useState('');
 useEffect(()=>saveState(state),[state]);
 const notify=(msg)=>{setToast(msg);setTimeout(()=>setToast(''),2200)};
 const set=(patch)=>setState(s=>({...s,...patch}));
 const navigate=(route,mode=state.mode,extra={})=>setState(s=>({...s,route,mode,...extra}));
 const published=state.posts.filter(p=>p.status==='Publicado').sort((a,b)=>b.date.localeCompare(a.date));
 const currentPost=state.posts.find(p=>p.id===state.selectedPostId)||published[0];
 const counts={published:state.posts.filter(p=>p.status==='Publicado').length,drafts:state.posts.filter(p=>p.status==='Borrador').length,inquiries:state.inquiries.length,assets:state.assets.length};
 return <div className={'app '+(state.collapsed?'collapsed':'') }>
  <Sidebar state={state} navigate={navigate} set={set}/>
  <main className="main">
    <Topbar state={state} set={set} navigate={navigate}/>
    <div className="content">
      {state.mode==='internal' ? <Internal state={state} setState={setState} set={set} notify={notify} counts={counts}/> : <Public state={state} setState={setState} navigate={navigate} published={published} currentPost={currentPost} notify={notify}/>}
    </div>
  </main>
  {toast && <div className="toast">{toast}</div>}
 </div>
}
function Sidebar({state,navigate,set}){
 const int=[['dashboard','Panel','⌘'],['content','Contenidos','✍'],['editor','Editor blog','▣'],['assets','Recursos','▤'],['leads','Consultas','↗'],['settings','Ajustes','⚙']];
 const pub=[['home','Inicio','◆'],['about','Sobre mí','◉'],['services','Servicios','✦'],['blog','Blog','☰'],['resources','Recursos','▥'],['contact','Formulario','✉']];
 const nav=state.mode==='internal'?int:pub;
 return <aside className="sidebar">
   <div className="brand"><div className="logo">ET</div><div className="brand-text"><div className="brand-title">Eduardo Tebar Boti</div><div className="brand-sub">Metodología clínica aplicada</div></div></div>
   <button className="toggle" onClick={()=>set({collapsed:!state.collapsed})}>{state.collapsed?'→':'←'} <span className="nav-label">Plegar menú</span></button>
   <div className="section-title">{state.mode==='internal'?'Backoffice interno':'Web pública'}</div>
   <nav className="nav">{nav.map(([r,l,i])=><button key={r} className={state.route===r?'active':''} onClick={()=>navigate(r)}><span className="ico">{i}</span><span className="nav-label">{l}</span></button>)}</nav>
   <div className="nav-note"><div className="profile-mini"><div className="avatar">E</div><div><b>Demo RIA local</b><br/>Sin backend · LocalStorage</div></div><p>Alterna entre tu zona interna y la web pública para presentar el flujo completo.</p></div>
 </aside>
}
function Topbar({state,set,navigate}){return <div className="topbar"><div><div className="crumb">{state.mode==='internal'?'Zona interna de gestión':'Experiencia pública'} / {state.route}</div><b>{state.mode==='internal'?'Backoffice · gestión editorial':'Web pública · Eduardo Tebar Boti'}</b></div><div className="mode-switch"><button className={state.mode==='public'?'active':''} onClick={()=>navigate('home','public')}>Vista pública</button><button className={state.mode==='internal'?'active':''} onClick={()=>navigate('dashboard','internal')}>Zona interna</button></div></div>}

function Internal({state,setState,set,notify,counts}){
 const route=state.route;
 return <div className="route-shell">
  {route==='dashboard'&&<Dashboard state={state} set={set} counts={counts}/>}
  {route==='content'&&<ContentManager state={state} setState={setState} notify={notify}/>}
  {route==='editor'&&<Editor state={state} setState={setState} notify={notify}/>}
  {route==='assets'&&<Assets state={state} setState={setState} notify={notify}/>}
  {route==='leads'&&<Leads state={state}/>}
  {route==='settings'&&<Settings state={state} setState={setState} notify={notify}/>}
 </div>
}
function Dashboard({state,counts}){
 useEffect(()=>{const ctx=document.getElementById('dashChart');if(!ctx||ctx.dataset.ready)return;ctx.dataset.ready=1;new Chart(ctx,{type:'doughnut',data:{labels:['Fundamentos','Causalidad','Predicción','Reporte'],datasets:[{data:[4,5,5,3]}]},options:{plugins:{legend:{labels:{color:'#dce8fa'}}}}})},[]);
 return <><section className="hero"><span className="eyebrow">Zona interna · centro de mando editorial</span><h1 className="h1">Gestiona contenidos, recursos, servicios y consultas desde un backoffice simulado.</h1><p className="lead">Esta zona representa tu aplicación privada: crear blogs, editar borradores, publicar noticias, gestionar recursos metodológicos y revisar solicitudes de asesoría. Todo queda guardado en el navegador.</p></section>
 <section className="grid cols-4 section"><KPI n={counts.published} t="Posts publicados"/><KPI n={counts.drafts} t="Borradores"/><KPI n={counts.assets} t="Recursos"/><KPI n={counts.inquiries} t="Consultas recibidas"/></section>
 <section className="grid cols-2 section"><div className="card"><h3>Mapa editorial recomendado</h3>{['Fundamentos transversales','Causalidad clínica aplicada','Predicción y pronóstico','Controversias y errores frecuentes','STATA 17 y código reproducible','Checklists para autores'].map((x,i)=><div key={x}><div className="toolbar" style={{justifyContent:'space-between'}}><b>{x}</b><span className="pill">prioridad {i+1}</span></div><div className="metric-line"><span style={{width:(92-i*9)+'%'}}></span></div></div>)}</div><div className="card"><h3>Distribución temática</h3><canvas id="dashChart" height="210"></canvas></div></section></>
}
function KPI({n,t}){return <div className="card"><div className="kpi">{n}</div><div className="muted">{t}</div></div>}
function ContentManager({state,setState,notify}){
 const del=(id)=>{setState(s=>({...s,posts:s.posts.filter(p=>p.id!==id)}));notify('Entrada eliminada')};
 const toggle=(id)=>{setState(s=>({...s,posts:s.posts.map(p=>p.id===id?{...p,status:p.status==='Publicado'?'Borrador':'Publicado'}:p)}));notify('Estado actualizado')};
 return <><section className="hero"><span className="eyebrow">Gestión rápida</span><h1 className="h1">Todos tus blogs, noticias y borradores en una tabla editorial.</h1><p className="lead">Desde aquí puedes revisar estado, publicar/despublicar y enviar una entrada al editor.</p></section><section className="card section" style={{overflowX:'auto'}}><table className="table"><thead><tr><th>Título</th><th>Categoría</th><th>Tipo</th><th>Estado</th><th>Fecha</th><th>Acciones</th></tr></thead><tbody>{state.posts.map(p=><tr key={p.id}><td><b>{p.title}</b><br/><span className="muted">{p.excerpt.slice(0,80)}...</span></td><td>{p.category}</td><td>{p.type}</td><td><span className="pill">{p.status}</span></td><td>{p.date}</td><td><div className="toolbar"><button className="btn" onClick={()=>setState(s=>({...s,route:'editor',selectedPostId:p.id}))}>Editar</button><button className="btn" onClick={()=>toggle(p.id)}>{p.status==='Publicado'?'Ocultar':'Publicar'}</button><button className="btn danger" onClick={()=>del(p.id)}>Eliminar</button></div></td></tr>)}</tbody></table></section></>
}
function Editor({state,setState,notify}){
 const editing=state.posts.find(p=>p.id===state.selectedPostId);
 const blank={id:null,status:'Borrador',type:'Artículo docente',category:'Fundamentos',title:'',excerpt:'',author:'Eduardo Tebar Boti',date:today(),read:'8 min',tags:[],body:''};
 const [form,setForm]=useState(editing||blank);
 useEffect(()=>setForm(editing||blank),[state.selectedPostId]);
 const setF=(k,v)=>setForm(f=>({...f,[k]:v}));
 const save=(publish=false)=>{const item={...form,id:form.id||crypto.randomUUID(),status:publish?'Publicado':form.status,tags:Array.isArray(form.tags)?form.tags:String(form.tags).split(',').map(x=>x.trim()).filter(Boolean)};setState(s=>{const exists=s.posts.some(p=>p.id===item.id);return {...s,posts:exists?s.posts.map(p=>p.id===item.id?item:p):[item,...s.posts],selectedPostId:item.id}});notify(publish?'Entrada publicada':'Entrada guardada')};
 return <section className="split"><div className="card"><h2>Editor interno de blog / noticia</h2><p className="muted">Crea contenido técnico con categoría, tipo editorial, tags, resumen y cuerpo. Se guarda localmente.</p><div className="form"><input className="input" placeholder="Título" value={form.title} onChange={e=>setF('title',e.target.value)}/><textarea className="textarea" placeholder="Resumen público" value={form.excerpt} onChange={e=>setF('excerpt',e.target.value)}></textarea><div className="grid cols-2"><select className="select" value={form.category} onChange={e=>setF('category',e.target.value)}>{['Fundamentos','Causalidad','Predicción','Reporte','STATA 17','Controversias','IA clínica'].map(x=><option key={x}>{x}</option>)}</select><select className="select" value={form.type} onChange={e=>setF('type',e.target.value)}>{['Artículo docente','Nota crítica','Caso metodológico','Plantilla','Código comentado','Noticia'].map(x=><option key={x}>{x}</option>)}</select></div><input className="input" placeholder="Tags separados por coma" value={Array.isArray(form.tags)?form.tags.join(', '):form.tags} onChange={e=>setF('tags',e.target.value)}/><textarea className="textarea" style={{minHeight:260}} placeholder="Cuerpo del artículo" value={form.body} onChange={e=>setF('body',e.target.value)}></textarea><div className="toolbar"><button className="btn" onClick={()=>save(false)}>Guardar borrador</button><button className="btn primary" onClick={()=>save(true)}>Publicar</button><button className="btn" onClick={()=>{setState(s=>({...s,selectedPostId:null}));setForm(blank)}}>Nuevo</button></div></div></div><div className="preview-frame"><div className="mini-browser"><span className="dot"></span><span className="dot"></span><span className="dot"></span><span className="muted" style={{marginLeft:8}}>Vista previa pública</span></div><div className="public-content"><ArticleView post={{...form,tags:Array.isArray(form.tags)?form.tags:String(form.tags).split(',')}} compact/></div></div></section>
}
function Assets({state,setState,notify}){
 const [name,setName]=useState(''); const [kind,setKind]=useState('Checklist');
 const add=()=>{if(!name.trim())return;setState(s=>({...s,assets:[{id:crypto.randomUUID(),name,kind,status:'Borrador',updated:today()},...s.assets]}));setName('');notify('Recurso añadido')}
 return <><section className="hero"><span className="eyebrow">Recursos metodológicos</span><h1 className="h1">Plantillas, checklists y guías para fidelizar lectores.</h1><p className="lead">Simula el gestor de documentos descargables que acompañarían al blog: plan estadístico, STROBE, TRIPOD+AI, validación externa o respuesta a revisores.</p></section><section className="grid cols-2 section"><div className="card form"><h3>Subir recurso simulado</h3><input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="Nombre del recurso"/><select className="select" value={kind} onChange={e=>setKind(e.target.value)}><option>Checklist</option><option>Plantilla</option><option>Guía</option><option>Código STATA</option><option>Bibliografía</option></select><button className="btn primary" onClick={add}>Añadir al gestor</button></div><div className="card"><h3>Repositorio interno</h3>{state.assets.map(a=><div className="check" key={a.id}><span className="ico">▤</span><div><b>{a.name}</b><br/><span className="muted">{a.kind} · {a.status} · actualizado {a.updated}</span></div></div>)}</div></section></>
}
function Leads({state}){return <><section className="hero"><span className="eyebrow">Consultas recibidas</span><h1 className="h1">Formulario público conectado al backoffice local.</h1><p className="lead">Cuando alguien rellena la consulta pública, aquí aparece como solicitud interna. Es una simulación completa sin servidor.</p></section><section className="grid section">{state.inquiries.length?state.inquiries.map(q=><div className="card" key={q.id}><div className="toolbar" style={{justifyContent:'space-between'}}><h3>{q.name}</h3><span className="pill">{q.kind}</span></div><p><b>Email:</b> {q.email}</p><p><b>Fase:</b> {q.stage}</p><p className="muted">{q.message}</p><div className="divider"></div><small className="muted">Recibido: {q.date}</small></div>):<div className="card"><h3>Aún no hay consultas</h3><p className="muted">Prueba la vista pública → Formulario y envía una solicitud.</p></div>}</section></>}
function Settings({state,setState,notify}){return <section className="grid cols-2"><div className="card"><h2>Ajustes de demo</h2><p className="muted">Puedes reiniciar datos locales o exportar el estado simulado.</p><div className="toolbar"><button className="btn danger" onClick={()=>{localStorage.removeItem(LS_KEY);location.reload()}}>Reiniciar demo</button><button className="btn" onClick={()=>{navigator.clipboard?.writeText(JSON.stringify(state,null,2));notify('JSON copiado')}}>Copiar JSON</button></div></div><div className="card"><h3>Arquitectura</h3><p className="muted">SPA/RIA en un único HTML. React renderiza rutas internas, CSS controla UI avanzada y localStorage actúa como base de datos local.</p><span className="tag">React CDN</span><span className="tag">Babel</span><span className="tag">Chart.js</span><span className="tag">LocalStorage</span><span className="tag">Sin backend</span></div></section>}

function Public({state,setState,navigate,published,currentPost,notify}){
 const r=state.route;
 return <div className="public-wrap route-shell"><PublicNav route={r} navigate={navigate}/><div className="public-content">
  {r==='home'&&<Home navigate={navigate}/>} {r==='about'&&<About/>} {r==='services'&&<Services services={state.services} navigate={navigate}/>} {r==='blog'&&<Blog posts={published} setState={setState}/>} {r==='article'&&<ArticleView post={currentPost}/>} {r==='resources'&&<Resources/>} {r==='contact'&&<Contact setState={setState} notify={notify}/>}
 </div><footer className="public-footer"><span>© 2026 Eduardo Tebar Boti · Bioestadística clínica rigurosa</span><span>Pregunta · Diseño · Estimando · Modelo · Interpretación · Reporte</span></footer></div>
}
function PublicNav({route,navigate}){const links=[['home','Inicio'],['about','Sobre mí'],['services','Servicios'],['blog','Blog'],['resources','Recursos'],['contact','Contacto']];return <div className="public-nav"><b>Eduardo Tebar Boti</b><div className="public-links">{links.map(([r,l])=><button className={route===r?'active':''} key={r} onClick={()=>navigate(r,'public')}>{l}</button>)}</div></div>}
function Home({navigate}){return <><section className="hero"><span className="eyebrow">Bioestadística clínica · causalidad · predicción · reporte</span><h1 className="h1">Metodología clínica aplicada para investigar, analizar y publicar mejor.</h1><p className="lead">Ayudo a médicos investigadores a formular preguntas clínicas sólidas, diseñar estudios defendibles, analizar datos con rigor e interpretar resultados sin confundir asociación, causalidad y predicción.</p><div className="cta-row"><button className="btn primary" onClick={()=>navigate('services','public')}>Ver servicios</button><button className="btn" onClick={()=>navigate('blog','public')}>Leer blog</button><button className="btn good" onClick={()=>navigate('contact','public')}>Solicitar consulta</button></div></section><section className="grid cols-3 section"><Value title="Causalidad clínica" text="Estimandos, DAGs, target trial emulation, sesgos temporales, propensity score, IPTW y sensibilidad."/><Value title="Predicción y pronóstico" text="Scores clínicos, validación externa, calibración, utilidad clínica, TRIPOD+AI y PROBAST+AI."/><Value title="Reporte científico" text="STROBE, CONSORT, PRISMA, RECORD, métodos reproducibles y respuesta a revisores."/></section><section className="card section"><h2>La tesis editorial</h2><p className="lead">La investigación clínica rigurosa exige alinear pregunta, diseño, estimando, datos, modelo estadístico, supuestos, interpretación y reporte. No hay buen análisis que rescate una mala pregunta.</p></section></>}
function Value({title,text}){return <div className="card service-card"><h3>{title}</h3><p className="muted">{text}</p></div>}
function About(){return <section className="split"><div className="hero"><span className="eyebrow">Sobre mí</span><h1 className="h1">Soy Eduardo Tebar Boti, médico y experto en metodología, análisis clínico y modelos estadísticos aplicados.</h1><p className="lead">Mi objetivo es ayudar a que los proyectos clínicos no empiecen por el software, sino por una pregunta bien formulada, un diseño coherente y una interpretación honesta.</p></div><div className="card"><h2>Enfoque profesional</h2><p className="muted">Trabajo especialmente con investigación explicativo-causal, estudios observacionales, modelos predictivos-pronósticos, validación de scores, análisis de supervivencia y reporte biomédico.</p>{['Asesoría pre-protocolo','Plan de análisis estadístico','Modelos causales y predictivos','Validación y recalibración de scores','Revisión metodológica de manuscritos','Respuesta a revisores'].map(x=><span className="tag" key={x}>{x}</span>)}</div></section>}
function Services({services,navigate}){return <><section className="hero"><span className="eyebrow">Servicios</span><h1 className="h1">Asesoría metodológica para investigación clínica seria.</h1><p className="lead">Servicios pensados para médicos, grupos clínicos y equipos que necesitan diseñar, analizar, validar o reportar estudios con rigor.</p></section><section className="grid cols-2 section">{services.map(s=><div className="card service-card" key={s.name}><span className="pill">{s.level}</span><h3>{s.name}</h3><p className="muted">{s.desc}</p><button className="btn primary" onClick={()=>navigate('contact','public')}>Consultar este servicio</button></div>)}</section></>}
function Blog({posts,setState}){return <><section className="hero"><span className="eyebrow">Blog y noticias metodológicas</span><h1 className="h1">Errores frecuentes, guías prácticas y pensamiento crítico para médicos investigadores.</h1><p className="lead">Cada entrada conecta un problema clínico real con diseño, análisis, interpretación y reporte.</p></section><section className="grid cols-3 section">{posts.map(p=><article key={p.id} className="card post-card" onClick={()=>setState(s=>({...s,route:'article',selectedPostId:p.id}))}><span className="pill">{p.category}</span><h3 className="post-title">{p.title}</h3><p className="muted">{p.excerpt}</p><div>{p.tags.map(t=><span className="tag" key={t}>{t}</span>)}</div><div className="divider"></div><small className="muted">{p.date} · {p.read} · {p.type}</small></article>)}</section></>}
function ArticleView({post,compact=false}){if(!post)return <div className="card">No hay artículo seleccionado.</div>;return <article className={compact?'':'article-detail'}><span className="eyebrow">{post.category} · {post.type}</span><h1>{post.title||'Título del artículo'}</h1><div className="article-meta"><span>{post.author}</span><span>·</span><span>{post.date}</span><span>·</span><span>{post.read}</span></div><p className="lead">{post.excerpt}</p><div>{(post.tags||[]).map(t=><span className="tag" key={t}>{t}</span>)}</div><div className="divider"></div><div className="post-body">{nl2p(post.body||'Escribe aquí el cuerpo del artículo. La vista previa mostrará cómo se leerá en la web pública.')}</div></article>}
function Resources(){const items=['Checklist antes de enviar un estudio observacional','Plantilla de plan de análisis estadístico','Guía para formular una pregunta causal','Plantilla de validación externa de un modelo pronóstico','Checklist TRIPOD+AI interpretada','Glosario crítico: confusor, mediador, collider y estimando'];return <><section className="hero"><span className="eyebrow">Recursos</span><h1 className="h1">Herramientas prácticas para diseñar, analizar y reportar mejor.</h1><p className="lead">Recursos simulados para mostrar cómo el blog podría ofrecer guías, checklists y plantillas descargables.</p></section><section className="grid cols-2 section">{items.map(x=><div className="card" key={x}><h3>{x}</h3><p className="muted">Recurso metodológico aplicado con definición, ejemplo clínico, errores frecuentes y checklist de uso.</p><button className="btn">Ver recurso</button></div>)}</section></>}
function Contact({setState,notify}){const [f,setF]=useState({name:'',email:'',kind:'Pre-protocolo',stage:'Idea / protocolo',message:''});const ch=(k,v)=>setF(x=>({...x,[k]:v}));const submit=()=>{if(!f.name||!f.email||!f.message){notify('Completa nombre, email y mensaje');return}setState(s=>({...s,inquiries:[{...f,id:crypto.randomUUID(),date:new Date().toLocaleString('es-ES')},...s.inquiries]}));setF({name:'',email:'',kind:'Pre-protocolo',stage:'Idea / protocolo',message:''});notify('Consulta enviada al backoffice')};return <section className="split"><div className="hero"><span className="eyebrow">Formulario estructurado</span><h1 className="h1">Solicita una consulta metodológica.</h1><p className="lead">Cuanto antes entre la metodología en el proyecto, mayor valor aporta: pregunta, diseño, outcome, estimando, variables, análisis y reporte.</p></div><div className="card form"><input className="input" placeholder="Nombre" value={f.name} onChange={e=>ch('name',e.target.value)}/><input className="input" placeholder="Email" value={f.email} onChange={e=>ch('email',e.target.value)}/><select className="select" value={f.kind} onChange={e=>ch('kind',e.target.value)}><option>Pre-protocolo</option><option>Análisis estadístico</option><option>Modelo predictivo</option><option>Manuscrito / revisores</option><option>Lectura crítica</option></select><select className="select" value={f.stage} onChange={e=>ch('stage',e.target.value)}><option>Idea / protocolo</option><option>Base de datos en construcción</option><option>Análisis iniciado</option><option>Manuscrito</option><option>Revisión por pares</option></select><textarea className="textarea" placeholder="Describe pregunta clínica, diseño, población, exposición/intervención, comparador, outcome, horizonte temporal, n y eventos." value={f.message} onChange={e=>ch('message',e.target.value)}></textarea><button className="btn primary" onClick={submit}>Enviar consulta simulada</button></div></section>}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
